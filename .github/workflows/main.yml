name: CI Pipeline

on:
  push:
    branches:
      - '**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Run app
        run: node api.js &

      - name: Wait for server
        run: sleep 3

      - name: Test API
        run: curl -f http://localhost:3000
        
      - name: Stop server
        run: pkill node
